title: Nitish Jadia
description: >- # this means to ignore newlines until "baseurl:"
  Technical writing on backend systems, platform engineering, software delivery, and the tools I learn by building with.
baseurl: ""
url: "https://jadia.dev"
permalink: /:year/:month/:day/:title/

# Logo & images
logo: /assets/images/me_circle_cropped.png
branding:
  tagline: Technical blog
  nav_tagline: backend systems, platform engineering, and software delivery
  home_title: Nitish Jadia
  home_intro: >-
    A personal engineering blog focused on infrastructure, Linux, containers,
    backend systems, and the practical lessons that remain useful over time.
  search_prompt: Search articles

design:
  # Centralized theme system.
  # Update values here first, then wire any new keys in `_includes/head.html` and `_scss/_custom.scss`.
  # Deep guide: docs/theme-customization.md
  typography:
    google_fonts_url: "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap"
    display: '"Newsreader", Georgia, serif'
    ui: '"Manrope", "Helvetica Neue", Arial, sans-serif'
    body: '"Source Serif 4", Georgia, serif'
    code: '"IBM Plex Mono", "SFMono-Regular", monospace'
  layout:
    # Controls outer container width and article reading width.
    shell_width: "min(1180px, calc(100vw - 1.5rem))"
    content_width: "80ch"
  header:
    # Mobile header controls (<560px). These values tune logo/actions overlap and edge alignment.
    mobile:
      right_clearance: "5.2rem"
      actions_right: "0rem"
      actions_top: "0.08rem"
      shell_padding_left: "0.65rem"
      shell_padding_right: "0.1rem"
  interaction:
    # Selected text styling (used by ::selection and ::-moz-selection).
    selection:
      text: "#ffffff"
      accent_mix: "22%"
      highlight_mix: "78%"
  palette:
    light:
      bg: "#f6fbfc"
      surface: "#ffffff"
      surface_soft: "#edf9f7"
      surface_strong: "#ffffff"
      border: "rgba(1, 22, 39, 0.12)"
      text: "#011627"
      text_soft: "#294255"
      heading: "#011627"
      accent: "#FF1A75"
      accent_strong: "#E60063"
      accent_soft: "rgba(46, 196, 182, 0.16)"
      accent_glow: "rgba(255, 26, 117, 0.2)"
      code_bg: "#f0f8fa"
      code_border: "rgba(1, 22, 39, 0.14)"
      code_text: "#011627"
      track: "rgba(46, 196, 182, 0.8)"
      highlight: "#2ec4b6"
    dark:
      bg: "#011627"
      surface: "#082033"
      surface_soft: "#0d2b42"
      surface_strong: "#14364f"
      border: "rgba(229, 246, 255, 0.14)"
      text: "#dff3ff"
      text_soft: "#9cc3d5"
      heading: "#ffffff"
      accent: "#FF1A75"
      accent_strong: "#2ec4b6"
      accent_soft: "rgba(46, 196, 182, 0.2)"
      accent_glow: "rgba(255, 26, 117, 0.32)"
      code_bg: "#0b2538"
      code_border: "rgba(229, 246, 255, 0.16)"
      code_text: "#dff3ff"
      track: "rgba(46, 196, 182, 0.88)"
      highlight: "#2ec4b6"

navigation:
  primary:
    - title: Articles
      url: /archive
    - title: Topics
      url: /tags
    - title: About
      url: /about
defaults:
  - scope:
      path: ""
    values:
      image: /assets/social-devops-python-preview.png
      summary:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      section: posts

# Author
author:
  name: Nitish Jadia
  url: https://jadia.dev
  twitter: nitishjadia

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jemoji
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-redirect-from

sass:
  sass_dir: _scss
  style: :compressed

include:
  - _pages
  - .well-known
header_pages:
  - _pages/about.md
  - _pages/archive.md
  - _pages/tags.md

footer-links:
  rss: rss
  twitter: nitishjadia
  github: jadia
  # facebook:
  linkedin: jadianitish
  #instagram: 

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - Dangerfile
  - docs
  - test
  - tmp
  - drafts_future
  - Dockerfile
  - README.md
  - .github

# Google Analytics
google_analytics: UA-61932410-4

# Disqus
disqus:
  shortname: jadia-dev

social:
  - name: Twitter
    icon: twitter
    desc: Follow me on Twitter
    share: true

  - name: Facebook
    icon: facebook
    desc: Friend me on Facebook
    share: true

  - name: LinkedIn
    icon: linkedin
    desc: Connect with me on LinkedIn
    share: true

# Pagination
pagination:
  enabled: true
  collection: 'posts'
  per_page: 7
  permalink: '/page/:num/'
  sort_field: 'date'
  sort_reverse: true

twitter:
  username: nitishjadia
  card: summary

compress_html:
  clippings: []
  comments: []
  endings: []
  ignore:
    envs: []
  blanklines: false
  profile: false
  startings: []

jekyll_compose:
  default_front_matter:
    drafts:
      summary:
      tags: []
      image: 
          path: /assets/social-devops-python-preview.png
          width: 1200
          height: 628
      updated_at:
      draft: true
      twitter:
          card: summary_large_image
    posts:
      summary:
      tags: []
      image: 
          path: /assets/social-devops-python-preview.png
          width: 1200
          height: 628
      updated_at:
      draft: false
      twitter:
          card: summary_large_image
