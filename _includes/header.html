<header class="site-header" role="banner">
  <div class="shell shell-header">
    <a class="site-brand" rel="author" href="{{ '/' | relative_url }}" aria-label="{{ site.title | escape }}">
      <span class="site-brand-mark">
        <img src="{{ site.logo | relative_url }}" alt="" loading="eager" decoding="async">
      </span>
      <span class="site-brand-copy">
        <strong>{{ site.title | escape }}</strong>
        <span>{{ site.branding.nav_tagline }}</span>
      </span>
    </a>

    <div class="header-actions">
      <div class="header-search" data-header-search>
        <button class="header-search-toggle" type="button" aria-label="Open article search" title="Search articles" data-header-search-toggle>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
          <span class="sr-only">Open search</span>
        </button>
        <form class="header-search-form" action="{{ '/search/' | relative_url }}" method="get" role="search">
          <label class="sr-only" for="header-search-input">Search articles</label>
          <input id="header-search-input" class="header-search-input" name="q" type="search" placeholder="{{ site.branding.search_prompt }}" autocomplete="off" data-header-search-input>
        </form>
      </div>
      <button class="theme-toggle" type="button" aria-label="Switch to dark theme" title="Switch theme" data-theme-toggle>
        <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4.2"></circle>
            <path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.7 5.3l-1.6 1.6M6.9 17.1l-1.6 1.6M18.7 18.7l-1.6-1.6M6.9 6.9L5.3 5.3"></path>
          </svg>
        </span>
        <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M20 14.2A8.5 8.5 0 0 1 9.8 4 9 9 0 1 0 20 14.2z"></path>
          </svg>
        </span>
        <span class="sr-only">Toggle color theme</span>
      </button>
    </div>

    <nav class="site-nav" aria-label="Primary navigation">
      {% for item in site.navigation.primary %}
        <a class="page-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
