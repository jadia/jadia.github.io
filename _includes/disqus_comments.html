<section class="comments-panel" data-comments-root data-disqus-shortname="{{ site.disqus.shortname }}" data-disqus-url="{{ site.url }}{{ page.url }}" data-disqus-identifier="{{ page.url }}">
  <div class="section-heading">
    <p class="section-kicker">Discussion</p>
    <h2>Comments</h2>
  </div>
  <p>Comments are powered by Disqus and load only when requested.</p>
  <button class="button button-secondary" type="button" data-load-comments>Load comments</button>
  <div id="disqus_thread"></div>
</section>
