---
layout: default
---
<article class="page-shell">
  <header class="section-heading section-heading--page">
    <p class="section-kicker">Page</p>
    <h1>{{ page.title | escape }}</h1>
    {% assign page_summary = page.description | default: page.summary %}
    {% if page_summary %}
      <p>{{ page_summary }}</p>
    {% endif %}
  </header>
  <div class="page-body-shell">
    <div class="article-content page-body">
      {{ content }}
    </div>
  </div>
</article>
