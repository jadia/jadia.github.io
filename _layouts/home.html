---
layout: default
---
{% assign all_latest = site.posts | sort: "date" | reverse %}

<section class="home-section home-section--timeline">
  <div class="section-heading">
    <p class="section-kicker">Latest</p>
  </div>
  <div class="stack-list">
    {% for entry in all_latest %}
      {% include article-card.html item=entry %}
    {% endfor %}
  </div>
</section>
