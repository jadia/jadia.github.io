---
layout: compress
---

<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}" 
      data-theme="light" 
      data-toc-scrollspy="{{ site.design.interaction.toc_scrollspy }}">
  {%- include head.html -%}
  <body>
    <div class="site-shell">
      {%- include header.html -%}
      <div class="reading-progress" data-reading-progress>
        <span class="reading-progress-bar" data-reading-progress-bar></span>
      </div>
      <main class="page-content" aria-label="Content">
        <div class="shell">
          {{ content }}
        </div>
      </main>
      {%- include footer.html -%}
    </div>
    <script src="{{ '/assets/main.js' | relative_url }}" defer></script>
  </body>
</html>
